name: daily-screen

# All times UTC. Cron drifts 10-30 min at peak — fine here.
# NOTE: GitHub silently DISABLES scheduled workflows after 60 days of repo
# inactivity; the keepalive job below pushes an empty commit weekly to prevent
# that. Use a PUBLIC repo for unlimited free Actions minutes.
on:
  schedule:
    - cron: "0 6 * * 1-5"   # 06:00 UTC, weekdays
  workflow_dispatch: {}      # allow manual runs

permissions:
  contents: write            # needed for the keepalive empty commit

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      # Persist caches between runs so we only fetch incremental price updates
      # (and don't re-download full histories or rebuild the universe daily).
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: data
          key: screener-data-${{ github.run_id }}
          restore-keys: screener-data-

      - name: Run screen
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}  # only used if write_up.engine == llm
        run: python -m screener.run

      # GitHub does NOT notify on failed scheduled runs. The screener emails on
      # failure itself (see notify.send_failure), but this is a second safety net.
      - name: Alert on failure
        if: failure()
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python -m screener.run --offline || true

  keepalive:
    # Weekly empty commit so the schedule isn't auto-disabled after 60 days idle.
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: Empty commit (Mondays only)
        run: |
          if [ "$(date -u +%u)" = "1" ]; then
            git config user.name "screener-keepalive"
            git config user.email "actions@github.com"
            git commit --allow-empty -m "chore: keepalive [skip ci]"
            git push
          fi
